name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Use HouseBudget.Backend.sln which excludes the MAUI project.
      # MAUI requires Android/iOS workloads not available on ubuntu-latest.
      - name: Restore dependencies
        run: dotnet restore HouseBudget.Backend.sln

      - name: Build solution
        run: dotnet build HouseBudget.Backend.sln --no-restore -c Release

      - name: Run tests with coverage
        run: |
          dotnet test HouseBudget.Backend.sln \
            --no-build \
            -c Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-results
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 14

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: housebudget-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
