name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same branch when a new push arrives,
# saving CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Job 1: Restore, build, and test the .NET solution
  # ===========================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Cache the NuGet package cache to speed up subsequent runs.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Restore all projects except the MAUI mobile project which requires
      # Android SDK tooling not available on ubuntu-latest.
      - name: Restore dependencies
        run: |
          dotnet restore HouseBudget.sln \
            /p:ExcludeProjects="src/HouseBudget.Mobile/HouseBudget.Mobile.csproj"

      - name: Build solution
        run: |
          dotnet build HouseBudget.sln \
            --no-restore \
            -c Release \
            /p:ExcludeProjects="src/HouseBudget.Mobile/HouseBudget.Mobile.csproj"

      - name: Run tests with coverage
        run: |
          dotnet test HouseBudget.sln \
            --no-build \
            -c Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            /p:ExcludeProjects="src/HouseBudget.Mobile/HouseBudget.Mobile.csproj"

      # Upload coverage reports so they are available as workflow artefacts
      # and can be consumed by coverage services (e.g. Codecov).
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-results
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 14

  # ===========================================================================
  # Job 2: Build the Docker image to verify the Dockerfile is valid.
  # Runs only on pushes to main (not on PRs) after build-and-test succeeds.
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    # Only run on direct pushes to main, not on pull_request events.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx for improved build performance and cache support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: housebudget-api:${{ github.sha }}
          # Use GitHub Actions cache to speed up layer fetching.
          cache-from: type=gha
          cache-to: type=gha,mode=max
