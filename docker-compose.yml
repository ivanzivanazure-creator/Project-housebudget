version: "3.9"

# =============================================================================
# Production-oriented compose file.
# Secrets are supplied via environment variables — never commit real values.
# Use docker-compose.override.yml for local development overrides.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # HouseBudget API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: housebudget-api:latest
    container_name: housebudget-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

      # SQL Server connection string — overridden in docker-compose.override.yml
      # for SQLite during development.
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=HouseBudget;
        User Id=sa;Password=${SA_PASSWORD};
        TrustServerCertificate=True;

      # JWT
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}

      # Stripe
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}

      # Serilog writes to ./logs inside the container; mount a host volume if
      # you need to persist logs outside the container lifecycle.
      Serilog__MinimumLevel__Default: Information

    depends_on:
      db:
        condition: service_healthy
    networks:
      - housebudget-net

  # ---------------------------------------------------------------------------
  # SQL Server 2022 (Express edition — free tier, ≤10 GB)
  # ---------------------------------------------------------------------------
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: housebudget-db
    restart: unless-stopped
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      # Wait until SQL Server is accepting connections before starting the API.
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -C -b -o /dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - housebudget-net

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  sqldata:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  housebudget-net:
    driver: bridge
